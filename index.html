<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Josiah & Alicia | October 16, 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
</head>
<body>

    <svg style="display:none;">
        <filter id="paperNoise">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
            <feComponentTransfer>
                <feFuncR type="linear" slope="0.2" />
                <feFuncG type="linear" slope="0.2" />
                <feFuncB type="linear" slope="0.2" />
                <feFuncA type="linear" slope="0.15" />
            </feComponentTransfer>
            <feBlend in="SourceGraphic" operator="overlay" />
        </filter>
    </svg>

    <div class="main-container">
        <img src="peony_top_left.png" alt="Peony Decoration" class="peony-top-left">
        
        <header>
            <p class="top-date">OCTOBER 16, 2026</p>
            <h1>Josiah & Alicia</h1>
        </header>
        
        <div class="divider"></div>

        <section class="event-details">
            <div class="venue-block">
                <h3>The Ceremony</h3>
                <p class="time">2:30 PM</p>
                <span class="venue-name">St. Alphonsus Mary de Liguori</span>
                <p class="address">Magallanes Village, Makati</p>
            </div>

            <div class="venue-block">
                <h3>The Celebration</h3>
                <p class="time">5:00 PM</p>
                <span class="venue-name">Manila Polo Club</span>
                <p class="address">Forbes Park, Makati</p>
            </div>
        </section>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdkzY7Vv8R7cEHJyGsZYUMWj0dNzXwERurhZ3WJ2NsAhp84Hw/viewform" target="_blank" class="rsvp-link">
            <button class="elegant-button">RSVP</button>
        </a>

        <footer>
        </footer>
        
        <img src="peony_bottom_right.png" alt="Peony Decoration" class="peony-bottom-right">
    </div>

</body>
</html>
